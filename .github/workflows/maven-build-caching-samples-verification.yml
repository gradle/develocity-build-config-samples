name: Verify Maven Build Caching Samples

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths: [ 'build-caching-maven-samples/**', '.github/workflows/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'build-caching-maven-samples/**', '.github/workflows/**' ]
  workflow_dispatch:

env:
  PROJECT_DIR: build-caching-maven-samples
  GOALS: verify
  ARGS: -B -Ddevelocity.cache.failOnUnhandledParameters=true

jobs:
  verification:
    name: Verification
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Maven
        uses: gradle/develocity-actions/setup-maven@0e1f30c14ab56d0c1ecf229a0ffc3eb3e40e4642 # v2.2
        with:
          develocity-access-key: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}
      - name: Setup Node.js and Npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - name: Set up Yarn
        run: npm install -g yarn
      - name: Download latest version of the Develocity Build Validation Scripts
        uses: gradle/develocity-build-validation-scripts/.github/actions/maven/download@94c54bdb1e6a57347930c62e9254d2c3e55fd5a5 # actions-stable
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run experiment 1
        uses: gradle/develocity-build-validation-scripts/.github/actions/maven/experiment-1@94c54bdb1e6a57347930c62e9254d2c3e55fd5a5 # actions-stable
        with:
          gitRepo: ${{ github.server_url }}/${{ github.repository }}
          gitCommitId: ${{ github.sha }}
          projectDir: ${{ env.PROJECT_DIR }}
          goals: ${{ env.GOALS }}
          args: ${{ env.ARGS }}
          failIfNotFullyCacheable: true
      - name: Publish .data for experiment 1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          path: develocity-maven-build-validation/.data/01-validate-local-build-caching-same-location/latest/
          name: 01-validate-local-build-caching-same-location-data-dir
      - name: Run experiment 2
        uses: gradle/develocity-build-validation-scripts/.github/actions/maven/experiment-2@94c54bdb1e6a57347930c62e9254d2c3e55fd5a5 # actions-stable
        with:
          gitRepo: ${{ github.server_url }}/${{ github.repository }}
          gitCommitId: ${{ github.sha }}
          projectDir: ${{ env.PROJECT_DIR }}
          goals: ${{ env.GOALS }}
          args: ${{ env.ARGS }}
          failIfNotFullyCacheable: true
      - name: Publish .data for experiment 2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          path: develocity-maven-build-validation/.data/02-validate-local-build-caching-different-locations/latest/
          name: 02-validate-local-build-caching-different-locations-data-dir
